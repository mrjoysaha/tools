<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF ↔ Text Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);

padding:20px;
}

.container{
max-width:900px;
margin:auto;

background:var(--card);

backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

select,
input,
textarea{
width:100%;
padding:12px;

border:none;
border-radius:12px;

margin-top:10px;
}

textarea{
height:300px;
resize:vertical;
}

button{
width:100%;
padding:14px;
margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.status{
margin-top:15px;
text-align:center;
}

.copy-btn{
background:#16a34a;
}

</style>
</head>
<body>

<div class="container">

<h1>📄 PDF ↔ TEXT Converter</h1>

<select id="mode">

<option value="pdf2text">
PDF → TEXT
</option>

<option value="text2pdf">
TEXT → PDF
</option>

</select>

<input
type="file"
id="fileInput"
accept=".pdf">

<textarea
id="textArea"
placeholder="Text will appear here or enter text for PDF creation...">
</textarea>

<button onclick="convert()">
Convert
</button>

<button
class="copy-btn"
onclick="copyText()">
Copy Text
</button>

<div class="status" id="status"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js";

async function convert(){

const mode =
document.getElementById("mode").value;

if(mode==="pdf2text"){
extractTextFromPDF();
}
else{
createPDF();
}

}

/* PDF TO TEXT */

async function extractTextFromPDF(){

const file =
document.getElementById("fileInput")
.files[0];

if(!file){

alert("Select a PDF file");

return;
}

document.getElementById("status")
.innerHTML="Extracting text...";

const pdfData =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data:pdfData
}).promise;

let fullText="";

for(let pageNum=1;
pageNum<=pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const textContent =
await page.getTextContent();

const text =
textContent.items
.map(item=>item.str)
.join(" ");

fullText +=
"\n\n--- PAGE "
+ pageNum +
" ---\n\n";

fullText += text;

}

document.getElementById("textArea")
.value = fullText;

document.getElementById("status")
.innerHTML =
"✅ Text Extracted Successfully";

}

/* TEXT TO PDF */

function createPDF(){

const text =
document.getElementById("textArea")
.value;

if(text.trim()===""){

alert("Enter text first");

return;
}

const { jsPDF } =
window.jspdf;

const pdf =
new jsPDF();

const lines =
pdf.splitTextToSize(
text,
180
);

pdf.text(
lines,
10,
15
);

pdf.save("document.pdf");

document.getElementById("status")
.innerHTML =
"✅ PDF Download Started";

}

/* COPY */

function copyText(){

const textarea =
document.getElementById("textArea");

textarea.select();

document.execCommand("copy");

alert("Copied!");
}

</script>

</body>
</html>
