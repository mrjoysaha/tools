<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#ffffff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);
}

.container{
width:100%;
max-width:550px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:30px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.password-box{
display:flex;
gap:10px;
}

.password-box input{
flex:1;

padding:14px;

border:none;
outline:none;

border-radius:12px;

font-size:16px;
}

button{
padding:14px 18px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.option{
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.option input[type=checkbox]{
transform:scale(1.2);
}

.length-box{
margin-top:20px;
}

.length-box input{
width:100%;
}

.strength{
margin-top:20px;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.weak{
background:#ef4444;
}

.medium{
background:#f59e0b;
}

.strong{
background:#22c55e;
}

.generate-btn{
width:100%;
margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<h1>🔐 Password Generator</h1>

<div class="password-box">

<input
type="text"
id="password"
readonly
placeholder="Generated Password">

<button onclick="copyPassword()">
Copy
</button>

</div>

<div class="length-box">

<label>
Length:
<span id="lengthValue">12</span>
</label>

<input
type="range"
id="length"
min="4"
max="50"
value="12">

</div>

<div class="option">
<label>Uppercase (A-Z)</label>
<input type="checkbox" id="uppercase" checked>
</div>

<div class="option">
<label>Lowercase (a-z)</label>
<input type="checkbox" id="lowercase" checked>
</div>

<div class="option">
<label>Numbers (0-9)</label>
<input type="checkbox" id="numbers" checked>
</div>

<div class="option">
<label>Symbols (!@#$)</label>
<input type="checkbox" id="symbols" checked>
</div>

<button
class="generate-btn"
onclick="generatePassword()">
Generate Password
</button>

<div
class="strength"
id="strength">
Strength: Medium
</div>

</div>

<script>

const lengthSlider =
document.getElementById("length");

const lengthValue =
document.getElementById("lengthValue");

lengthSlider.addEventListener(
"input",
()=>{
lengthValue.innerText =
lengthSlider.value;
}
);

function generatePassword(){

const upper =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const lower =
"abcdefghijklmnopqrstuvwxyz";

const numbers =
"0123456789";

const symbols =
"!@#$%^&*()_+[]{}<>?/";

let chars="";

if(document.getElementById("uppercase").checked)
chars += upper;

if(document.getElementById("lowercase").checked)
chars += lower;

if(document.getElementById("numbers").checked)
chars += numbers;

if(document.getElementById("symbols").checked)
chars += symbols;

if(chars===""){

alert("Select at least one option.");

return;
}

let password="";

for(let i=0;i<lengthSlider.value;i++){

password += chars.charAt(
Math.floor(
Math.random()*chars.length
)
);

}

document.getElementById("password")
.value=password;

updateStrength(password);

}

function updateStrength(password){

const strength =
document.getElementById("strength");

let score=0;

if(password.length>=8) score++;
if(password.length>=12) score++;
if(/[A-Z]/.test(password)) score++;
if(/[0-9]/.test(password)) score++;
if(/[!@#$%^&*()_+\[\]{}<>?/]/.test(password))
score++;

strength.className="strength";

if(score<=2){

strength.classList.add("weak");

strength.innerHTML=
"Strength: Weak";

}
else if(score<=4){

strength.classList.add("medium");

strength.innerHTML=
"Strength: Medium";

}
else{

strength.classList.add("strong");

strength.innerHTML=
"Strength: Strong";

}

}

function copyPassword(){

const password =
document.getElementById("password");

if(password.value==="") return;

navigator.clipboard.writeText(
password.value
);

alert("Password copied!");
}

generatePassword();

</script>

</body>
</html>
