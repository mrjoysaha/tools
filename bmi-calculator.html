<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>

:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.12);
    --text:#fff;
    --primary:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    radial-gradient(circle at top left,#2563eb25,transparent 25%),
    radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
    var(--bg);

    color:var(--text);
}

.container{
    width:100%;
    max-width:420px;

    padding:30px;

    border-radius:20px;

    background:var(--card);
    backdrop-filter:blur(20px);

    border:1px solid var(--border);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:14px;

    border:none;
    outline:none;

    border-radius:12px;

    font-size:16px;
}

button{
    width:100%;
    padding:14px;

    border:none;
    cursor:pointer;

    border-radius:12px;

    font-size:16px;
    font-weight:600;

    background:var(--primary);
    color:white;

    margin-top:10px;
}

.result{
    margin-top:25px;
    text-align:center;
}

.bmi-value{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.category{
    font-size:18px;
    padding:10px;
    border-radius:10px;
}

.underweight{
    background:#f59e0b;
}

.normal{
    background:#22c55e;
}

.overweight{
    background:#f97316;
}

.obese{
    background:#ef4444;
}

.info{
    margin-top:20px;
    opacity:.8;
    font-size:14px;
    text-align:center;
}

</style>
</head>
<body>

<div class="container">

    <h1>⚖️ BMI Calculator</h1>

    <div class="input-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="Enter height">
    </div>

    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter weight">
    </div>

    <button onclick="calculateBMI()">
        Calculate BMI
    </button>

    <div class="result" id="result"></div>

    <div class="info">
        BMI Categories:<br>
        Underweight &lt; 18.5 |
        Normal 18.5–24.9 |
        Overweight 25–29.9 |
        Obese ≥ 30
    </div>

</div>

<script>

function calculateBMI(){

    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;

    if(height === "" || weight === ""){

        document.getElementById("result").innerHTML =
        "<p>Please enter height and weight.</p>";

        return;
    }

    height = height / 100;

    let bmi = weight / (height * height);

    bmi = bmi.toFixed(1);

    let category = "";
    let className = "";

    if(bmi < 18.5){
        category = "Underweight";
        className = "underweight";
    }
    else if(bmi < 25){
        category = "Normal Weight";
        className = "normal";
    }
    else if(bmi < 30){
        category = "Overweight";
        className = "overweight";
    }
    else{
        category = "Obese";
        className = "obese";
    }

    document.getElementById("result").innerHTML = `
        <div class="bmi-value">${bmi}</div>
        <div class="category ${className}">
            ${category}
        </div>
    `;
}

</script>

</body>
</html>
