<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00adb5;
        }
        /* Grid layout for wallpapers */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .wallpaper-card {
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .wallpaper-card:hover {
            transform: translateY(-5px);
        }
        .wallpaper-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background-color: #252530; /* Loading placeholder color */
        }
        .wallpaper-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wallpaper-title {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .download-btn {
            background-color: #00adb5;
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background-color: #007c82;
        }
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cloud Wallpapers</h1>
        <p>Automatically synced from my Google Drive</p>
    </header>

    <div class="gallery" id="gallery">
        <div class="loading">Loading wallpapers...</div>
    </div>

    <script>
        // 2. REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
        const API_URL = "https://script.google.com/macros/s/AKfycbyxwHP4nuYYp-D8j9a1xxBX32oVQKObCAAxiPRKbRNItpz2I_fEIkRoYQV8Hf23ez1c9Q/exec";

        async function fetchWallpapers() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Clear the loading message
                gallery.innerHTML = '';

                if(data.length === 0) {
                    gallery.innerHTML = '<div class="loading">No images found in the folder.</div>';
                    return;
                }

                // Loop through data and build the HTML cards
                data.forEach(wallpaper => {
                    const card = document.createElement('div');
                    card.className = 'wallpaper-card';
                    card.innerHTML = `
                        <img src="${wallpaper.url}" alt="${wallpaper.name}" loading="lazy">
                        <div class="wallpaper-info">
                            <span class="wallpaper-title" title="${wallpaper.name}">${wallpaper.name}</span>
                            <a href="${wallpaper.url}" target="_blank" download="${wallpaper.name}" class="download-btn">View Full</a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                console.error("Error fetching wallpapers:", error);
                gallery.innerHTML = '<div class="loading">Failed to load wallpapers. Make sure your script URL is correct and public.</div>';
            }
        }

        // Run the function when the page loads
        fetchWallpapers();
    </script>
</body>
</html>
