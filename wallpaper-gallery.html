<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00adb5;
        }
        
        /* Responsive Grid Masonry Style */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .wallpaper-card {
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .wallpaper-card:hover {
            transform: scale(1.03);
        }
        .img-container {
            width: 100%;
            height: 380px; /* Taller viewport container for phone/desktop wallpapers */
            overflow: hidden;
            background-color: #252530;
        }
        .wallpaper-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps thumbnail grids uniform */
            display: block;
        }
        .wallpaper-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .wallpaper-title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .download-btn {
            background-color: #00adb5;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background-color: #007c82;
        }
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: #888;
            padding: 50px 0;
        }

        /* --- Full Screen Lightbox Modal --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            object-fit: contain; /* Assures actual aspect ratio displays perfectly full-size */
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Wallpapers</h1>
        <p>Click download to save original.</p>
    </header>

    <div class="gallery" id="gallery">
        <div class="loading">Loading wallpapers...</div>
    </div>

    <!-- Lightbox UI element -->
    <div class="lightbox" id="lightbox" onclick="closeFullView()">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Full size preview">
    </div>

    <script>
        // PASTE YOUR NEWLY GENERATED APPS SCRIPT WEB APP URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbzfidiGQFnvABKTQUtZzpKUYCzi0WvFY_tSAiOJ6Uwg-t3OCxz6nmvTsv0ZvaG6PKxi2Q/exec";

        async function fetchWallpapers() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                gallery.innerHTML = '';

                if(data.length === 0) {
                    gallery.innerHTML = '<div class="loading">No wallpapers found in this folder.</div>';
                    return;
                }

                data.forEach(wallpaper => {
                    const card = document.createElement('div');
                    card.className = 'wallpaper-card';
                    
                    // Clicking the card body or image opens the full-screen view
                    card.innerHTML = `
                        <div class="img-container" onclick="openFullView('${wallpaper.viewUrl}')">
                            <img src="${wallpaper.viewUrl}" alt="${wallpaper.name}" loading="lazy">
                        </div>
                        <div class="wallpaper-info">
                            <span class="wallpaper-title" title="${wallpaper.name}">${wallpaper.name}</span>
                            <a href="${wallpaper.downloadUrl}" class="download-btn" target="_blank">Download High-Res</a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading gallery data:", error);
                gallery.innerHTML = '<div class="loading">Failed to load wallpapers. Double-check your web app deployment settings.</div>';
            }
        }

        // Lightbox controller functions
        function openFullView(url) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = url;
            lightbox.classList.add('active');
        }

        function closeFullView() {
            document.getElementById('lightbox').classList.remove('active');
        }

        fetchWallpapers();
    </script>
</body>
</html>
