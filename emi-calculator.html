<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Calculator</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

display:flex;
justify-content:center;
align-items:center;

color:var(--text);
}

.container{
width:100%;
max-width:700px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:12px;

border:none;
outline:none;

border-radius:12px;

font-size:16px;
}

button{
width:100%;
padding:14px;

margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.result{
margin-top:20px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.05);

line-height:2;
}

.bar{
height:22px;
background:#1f2937;

border-radius:20px;

overflow:hidden;

margin-top:10px;
}

.bar-fill{
height:100%;
width:0%;

background:#22c55e;

transition:.5s;
}

.copy-btn{
background:#16a34a;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>💰 EMI Calculator</h1>

<input
type="number"
id="loan"
placeholder="Loan Amount">

<input
type="number"
id="rate"
placeholder="Interest Rate (%)">

<input
type="number"
id="years"
placeholder="Loan Tenure (Years)">

<button onclick="calculateEMI()">
Calculate EMI
</button>

<div
class="result"
id="result">

Enter details and click Calculate.

</div>

<div class="bar">
<div
class="bar-fill"
id="barFill">
</div>
</div>

<button
class="copy-btn"
onclick="copyResult()">

Copy Result

</button>

</div>

<script>

function calculateEMI(){

const P =
parseFloat(
document.getElementById("loan").value
);

const annualRate =
parseFloat(
document.getElementById("rate").value
);

const years =
parseFloat(
document.getElementById("years").value
);

if(!P || !annualRate || !years){

alert("Please fill all fields.");

return;
}

const r =
annualRate / 12 / 100;

const n =
years * 12;

const EMI =
(
P * r *
Math.pow(1+r,n)
)
/
(
Math.pow(1+r,n)-1
);

const totalPayment =
EMI * n;

const totalInterest =
totalPayment - P;

document.getElementById(
"result"
).innerHTML =

`
<b>Monthly EMI:</b>
₹ ${EMI.toFixed(2)}
<br>

<b>Total Interest:</b>
₹ ${totalInterest.toFixed(2)}
<br>

<b>Total Payment:</b>
₹ ${totalPayment.toFixed(2)}
<br>

<b>Loan Tenure:</b>
${years} Years
`;

const percent =
(totalInterest /
totalPayment) * 100;

document.getElementById(
"barFill"
).style.width =
percent + "%";

}

function copyResult(){

const text =
document.getElementById(
"result"
).innerText;

navigator.clipboard.writeText(
text
);

alert("Result copied!");

}

</script>

</body>
</html>
