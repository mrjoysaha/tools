<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PNG ↔ JPG Converter</title>

<style>

:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.12);
    --text:#fff;
    --primary:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    padding:20px;

    background:
    radial-gradient(circle at top left,#2563eb25,transparent 25%),
    radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
    var(--bg);

    color:var(--text);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:700px;

    background:var(--card);
    backdrop-filter:blur(20px);

    border:1px solid var(--border);

    border-radius:20px;

    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed rgba(255,255,255,.25);

    border-radius:15px;

    padding:25px;

    text-align:center;
}

input[type=file]{
    width:100%;
}

select{
    width:100%;

    margin-top:20px;

    padding:12px;

    border:none;
    border-radius:12px;

    font-size:16px;
}

button{
    width:100%;

    margin-top:20px;

    padding:14px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    font-size:16px;
    font-weight:bold;

    background:var(--primary);
    color:white;
}

.preview{
    margin-top:25px;
    text-align:center;
}

.preview img{
    max-width:100%;
    max-height:350px;

    border-radius:15px;
}

.download-btn{
    display:none;

    margin-top:20px;

    text-decoration:none;

    text-align:center;

    padding:14px;

    border-radius:12px;

    background:#16a34a;
    color:white;
}

.info{
    margin-top:15px;
    text-align:center;
}

</style>
</head>
<body>

<div class="container">

    <h1>🖼️ PNG ↔ JPG Converter</h1>

    <div class="upload-box">

        <input
            type="file"
            id="imageInput"
            accept=".png,.jpg,.jpeg,image/png,image/jpeg">

    </div>

    <select id="format">

        <option value="jpg">
            Convert To JPG
        </option>

        <option value="png">
            Convert To PNG
        </option>

    </select>

    <button onclick="convertImage()">
        Convert Image
    </button>

    <div class="preview" id="preview"></div>

    <div class="info" id="info"></div>

    <a
        id="downloadBtn"
        class="download-btn">
        Download Converted Image
    </a>

</div>

<script>

let selectedFile = null;

document
.getElementById("imageInput")
.addEventListener("change",function(){

    selectedFile = this.files[0];

    if(!selectedFile) return;

    const reader =
    new FileReader();

    reader.onload = function(e){

        document
        .getElementById("preview")
        .innerHTML =
        `<img src="${e.target.result}">`;

    };

    reader.readAsDataURL(selectedFile);

});

function convertImage(){

    if(!selectedFile){

        alert("Please select an image.");

        return;
    }

    const targetFormat =
    document.getElementById("format").value;

    const reader =
    new FileReader();

    reader.onload = function(e){

        const img =
        new Image();

        img.onload = function(){

            const canvas =
            document.createElement("canvas");

            canvas.width = img.width;
            canvas.height = img.height;

            const ctx =
            canvas.getContext("2d");

            if(targetFormat === "jpg"){

                /* White background for transparent PNG */

                ctx.fillStyle = "#ffffff";

                ctx.fillRect(
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );
            }

            ctx.drawImage(
                img,
                0,
                0
            );

            const mimeType =
            targetFormat === "png"
            ? "image/png"
            : "image/jpeg";

            const converted =
            canvas.toDataURL(
                mimeType,
                0.9
            );

            document
            .getElementById("preview")
            .innerHTML =
            `<img src="${converted}">`;

            const downloadBtn =
            document.getElementById(
                "downloadBtn"
            );

            const name =
            selectedFile.name
            .split(".")[0];

            downloadBtn.href =
            converted;

            downloadBtn.download =
            `${name}.${targetFormat}`;

            downloadBtn.style.display =
            "block";

            document
            .getElementById("info")
            .innerHTML =
            `✅ Successfully converted to ${targetFormat.toUpperCase()}`;

        };

        img.src = e.target.result;

    };

    reader.readAsDataURL(selectedFile);

}

</script>

</body>
</html>
