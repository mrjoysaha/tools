<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tic Tac Toe</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
padding:20px;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);
}

.container{
width:100%;
max-width:500px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;

text-align:center;
}

h1{
margin-bottom:20px;
}

select{
width:100%;
padding:12px;

border:none;
border-radius:12px;

margin-bottom:20px;
}

.scoreboard{
display:flex;
justify-content:space-around;

margin-bottom:20px;
}

.score{
background:rgba(255,255,255,.05);

padding:10px 15px;

border-radius:12px;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);

gap:10px;

margin-bottom:20px;
}

.cell{
height:100px;

display:flex;
justify-content:center;
align-items:center;

font-size:40px;
font-weight:bold;

cursor:pointer;

border-radius:15px;

background:rgba(255,255,255,.05);

transition:.3s;
}

.cell:hover{
background:rgba(255,255,255,.1);
}

.status{
margin-bottom:15px;
font-size:18px;
}

button{
width:100%;

padding:14px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>❌⭕ Tic Tac Toe</h1>

<select id="gameMode">

<option value="single">
Single Player
</option>

<option value="multi">
Multiplayer
</option>

</select>

<div class="scoreboard">

<div class="score">
X: <span id="scoreX">0</span>
</div>

<div class="score">
O: <span id="scoreO">0</span>
</div>

</div>

<div
class="status"
id="status">

Player X Turn

</div>

<div class="board" id="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<button onclick="resetGame()">
Restart Game
</button>

</div>

<script>

let board =
["","","","","","","","",""];

let currentPlayer = "X";

let gameActive = true;

let scoreX = 0;
let scoreO = 0;

const winPatterns = [

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8],

[0,4,8],
[2,4,6]

];

const cells =
document.querySelectorAll(".cell");

cells.forEach(cell=>{

cell.addEventListener(
"click",
handleCellClick
);

});

function handleCellClick(){

const index =
this.dataset.index;

if(
board[index] !== ""
||
!gameActive
){
return;
}

board[index] =
currentPlayer;

this.textContent =
currentPlayer;

checkWinner();

if(
document.getElementById(
"gameMode"
).value === "single"
&&
currentPlayer === "O"
&&
gameActive
){

setTimeout(
computerMove,
500
);

}

}

function computerMove(){

let empty =
board
.map((v,i)=>
v===""?i:null)
.filter(v=>v!==null);

if(empty.length===0) return;

let move =
empty[
Math.floor(
Math.random()*empty.length
)
];

board[move] = "O";

cells[move].textContent =
"O";

checkWinner();

}

function checkWinner(){

for(let pattern of winPatterns){

let [a,b,c] = pattern;

if(
board[a] &&
board[a]===board[b]
&&
board[a]===board[c]
){

gameActive = false;

document.getElementById(
"status"
).innerHTML =
board[a] + " Wins! 🎉";

if(board[a]==="X"){

scoreX++;

document.getElementById(
"scoreX"
).innerText =
scoreX;

}else{

scoreO++;

document.getElementById(
"scoreO"
).innerText =
scoreO;

}

return;
}

}

if(!board.includes("")){

gameActive = false;

document.getElementById(
"status"
).innerHTML =
"It's a Draw 🤝";

return;
}

currentPlayer =
currentPlayer==="X"
? "O"
: "X";

document.getElementById(
"status"
).innerHTML =
"Player "
+
currentPlayer
+
" Turn";

}

function resetGame(){

board =
["","","","","","","","",""];

gameActive = true;

currentPlayer = "X";

cells.forEach(cell=>{

cell.textContent = "";

});

document.getElementById(
"status"
).innerHTML =
"Player X Turn";

}

</script>

</body>
</html>
