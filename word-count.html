<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#ffffff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;

padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);

display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:900px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:250px;

padding:15px;

border:none;
outline:none;

border-radius:15px;

resize:vertical;

font-size:16px;
}

.stats{
margin-top:20px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(150px,1fr));

gap:15px;
}

.stat{
background:rgba(255,255,255,.05);

padding:15px;

border-radius:12px;

text-align:center;
}

.stat h3{
font-size:24px;
margin-bottom:5px;
}

.buttons{
margin-top:20px;

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:14px;

border:none;
border-radius:12px;

cursor:pointer;

font-size:15px;
font-weight:bold;
}

.copy-btn{
background:#16a34a;
color:white;
}

.clear-btn{
background:#ef4444;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>📝 Word Counter</h1>

<textarea
id="textInput"
placeholder="Type or paste your text here..."
oninput="updateStats()">
</textarea>

<div class="stats">

<div class="stat">
<h3 id="words">0</h3>
<p>Words</p>
</div>

<div class="stat">
<h3 id="characters">0</h3>
<p>Characters</p>
</div>

<div class="stat">
<h3 id="charactersNoSpace">0</h3>
<p>No Spaces</p>
</div>

<div class="stat">
<h3 id="sentences">0</h3>
<p>Sentences</p>
</div>

<div class="stat">
<h3 id="paragraphs">0</h3>
<p>Paragraphs</p>
</div>

<div class="stat">
<h3 id="readingTime">0</h3>
<p>Min Read</p>
</div>

</div>

<div class="buttons">

<button
class="copy-btn"
onclick="copyText()">
Copy Text
</button>

<button
class="clear-btn"
onclick="clearText()">
Clear Text
</button>

</div>

</div>

<script>

function updateStats(){

const text =
document.getElementById("textInput").value;

const words =
text.trim() === ""
? 0
: text.trim().split(/\s+/).length;

const characters =
text.length;

const charactersNoSpace =
text.replace(/\s/g,'').length;

const sentences =
text.trim() === ""
? 0
: text.split(/[.!?]+/)
.filter(item=>item.trim().length>0)
.length;

const paragraphs =
text.trim() === ""
? 0
: text.split(/\n+/)
.filter(item=>item.trim().length>0)
.length;

const readingTime =
Math.ceil(words / 200);

document.getElementById("words")
.innerText = words;

document.getElementById("characters")
.innerText = characters;

document.getElementById("charactersNoSpace")
.innerText = charactersNoSpace;

document.getElementById("sentences")
.innerText = sentences;

document.getElementById("paragraphs")
.innerText = paragraphs;

document.getElementById("readingTime")
.innerText = readingTime;

}

function copyText(){

const textarea =
document.getElementById("textInput");

navigator.clipboard.writeText(
textarea.value
);

alert("Text copied!");
}

function clearText(){

document.getElementById("textInput")
.value = "";

updateStats();

}

updateStats();

</script>

</body>
</html>
