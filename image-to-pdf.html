<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image To PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.12);
    --text:#fff;
    --primary:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    padding:20px;

    background:
    radial-gradient(circle at top left,#2563eb25,transparent 25%),
    radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
    var(--bg);

    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;

    background:var(--card);
    backdrop-filter:blur(20px);

    border:1px solid var(--border);

    border-radius:20px;

    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed rgba(255,255,255,.25);
    border-radius:15px;

    padding:30px;
    text-align:center;

    cursor:pointer;
}

.upload-box:hover{
    background:rgba(255,255,255,.05);
}

input[type=file]{
    width:100%;
}

.preview-grid{
    margin-top:20px;

    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

.preview-item{
    background:rgba(255,255,255,.05);
    border-radius:12px;
    overflow:hidden;
}

.preview-item img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.preview-item p{
    padding:8px;
    text-align:center;
    font-size:12px;
}

button{
    width:100%;
    margin-top:25px;

    border:none;
    cursor:pointer;

    padding:14px;

    border-radius:12px;

    font-size:16px;
    font-weight:bold;

    background:var(--primary);
    color:white;
}

.status{
    text-align:center;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

    <h1>📄 Image To PDF Converter</h1>

    <div class="upload-box">

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            multiple>

        <p style="margin-top:15px;">
            Select one or more images
        </p>

    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <button onclick="convertToPDF()">
        Convert To PDF
    </button>

    <div class="status" id="status"></div>

</div>

<script>

const imageInput =
document.getElementById("imageInput");

const previewGrid =
document.getElementById("previewGrid");

let selectedImages = [];

imageInput.addEventListener(
"change",
function(){

    selectedImages =
    Array.from(this.files);

    previewImages();

});

function previewImages(){

    previewGrid.innerHTML = "";

    selectedImages.forEach(file=>{

        const reader =
        new FileReader();

        reader.onload = function(e){

            previewGrid.innerHTML += `
            <div class="preview-item">
                <img src="${e.target.result}">
                <p>${file.name}</p>
            </div>
            `;

        };

        reader.readAsDataURL(file);

    });

}

async function convertToPDF(){

    if(selectedImages.length === 0){

        alert("Please select images.");

        return;
    }

    const status =
    document.getElementById("status");

    status.innerHTML =
    "⏳ Creating PDF...";

    const { jsPDF } =
    window.jspdf;

    const pdf =
    new jsPDF();

    for(let i=0;i<selectedImages.length;i++){

        const file =
        selectedImages[i];

        const dataUrl =
        await fileToDataURL(file);

        const img =
        await loadImage(dataUrl);

        const pdfWidth =
        pdf.internal.pageSize.getWidth();

        const pdfHeight =
        (img.height * pdfWidth) /
        img.width;

        if(i>0){
            pdf.addPage();
        }

        pdf.addImage(
            dataUrl,
            "JPEG",
            0,
            0,
            pdfWidth,
            pdfHeight
        );
    }

    pdf.save("images.pdf");

    status.innerHTML =
    "✅ PDF Download Started";

}

function fileToDataURL(file){

    return new Promise(resolve=>{

        const reader =
        new FileReader();

        reader.onload =
        e=>resolve(e.target.result);

        reader.readAsDataURL(file);

    });

}

function loadImage(src){

    return new Promise(resolve=>{

        const img =
        new Image();

        img.onload =
        ()=>resolve(img);

        img.src = src;

    });

}

</script>

</body>
</html>
