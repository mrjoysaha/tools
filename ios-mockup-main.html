
<html lang="en">
<head>
    <meta charset="UTF-8"></meta>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"></meta>
    <title>Stylish Mockup Generator</title>
    
     <!-- External Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Codystar&amp;family=Inter:wght@300;400;600&amp;family=Playfair+Display:ital,wght@0,400;1,400&amp;family=Sacramento&amp;display=swap" rel="stylesheet"></link>

    <style>
        :root {
            --bg-dark: #000000;
            --panel-dark: #0a0a0a;
            --border-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-gray: #a1a1aa;
            
            /* Dynamic Frame Colors */
            --iphone-rim: #3a3a3c;
            --iphone-bg: #111112;
            --antenna-opacity: 0; 
            --antenna-color: rgba(255,255,255,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0px;
        }

        .license-badge {
            font-size: 11px;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px dashed #333;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .editor-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--panel-dark);
            border: 1px solid var(--border-dark);
            border-radius: 24px;
            overflow: hidden;
            padding: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 14px 12px;
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .close-btn { cursor: pointer; font-size: 18px; }

        /* --- Main Exportable Artboard Preview (3:4 Square Ratio Aspect) --- */
        .preview-canvas {
            background: #cc3333;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            position: relative;
            aspect-ratio: 3 / 4; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 24px;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* --- Pattern Contrast Systems --- */
        /* --- DARK THEME OVERLAYS --- */
        .preview-canvas.contrast-dark.pattern-dotted {
            background-image: radial-gradient(rgba(0, 0, 0, 0.15) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .preview-canvas.contrast-dark.pattern-lines {
            background-image: linear-gradient(rgba(0, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 100% 10px; 
        }
        .preview-canvas.contrast-dark.pattern-box {
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
            background-size: 12px 12px; 
        }
        .preview-canvas.contrast-dark.pattern-line-135 {
            background-image: linear-gradient(135deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .preview-canvas.contrast-dark.pattern-line-270 {
            background-image: linear-gradient(90deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 10px 100%;
        }
        .preview-canvas.contrast-dark.pattern-line-315 {
            background-image: linear-gradient(45deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* --- LIGHT THEME OVERLAYS --- */
        .preview-canvas.contrast-light.pattern-dotted {
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .preview-canvas.contrast-light.pattern-lines {
            background-image: linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 100% 10px; 
        }
        .preview-canvas.contrast-light.pattern-box {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 12px 12px; 
        }
        .preview-canvas.contrast-light.pattern-line-135 {
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 15px 15px;
        }
        .preview-canvas.contrast-light.pattern-line-270 {
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 10px 100%;
        }
        .preview-canvas.contrast-light.pattern-line-315 {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* --- Header Overlay Block --- */
        .canvas-header-meta {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 20px;
            z-index: 20;
        }

        .canvas-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #ffffff;
        }
        .text-top-left { font-family: 'Sacramento', cursive; font-size: 1.3rem; opacity: 0.9;}
        .text-top-right { font-size: 0.75rem; letter-spacing: 1px; opacity: 0.9; }

        /* --- Content Layout --- */
        .center-content-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
            z-index: 10;
        }

        .device-slot-wrapper {
            width: 100%;
            height: 335px;
            display: flex;
            justify-content: center;
            align-items: center; 
        }

        .screen-view {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .phone-screen-glass {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .upload-trigger-btn {
            background-color: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 8px 14px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 600;
            z-index: 25;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .frame-iphone {
            width: 185px;  
            height: 335px; 
            background: var(--iphone-bg);
            border: 4px solid var(--iphone-rim); 
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2), 0 30px 65px rgba(0,0,0,0.55), 0 8px 22px rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 6px; 
            position: relative;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .antenna-band {
            position: absolute;
            background-color: var(--antenna-color);
            opacity: var(--antenna-opacity);
            transition: opacity 0.2s;
            z-index: 10;
        }
        .antenna-top-left { top: 45px; left: -4px; width: 4px; height: 3px; }
        .antenna-top-right { top: 45px; right: -4px; width: 4px; height: 3px; }
        .antenna-bottom-left { bottom: 45px; left: -4px; width: 4px; height: 3px; }
        .antenna-bottom-right { bottom: 45px; right: -4px; width: 4px; height: 3px; }

        .frame-iphone::before {
            content: '';
            position: absolute;
            top: 13px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 14px;
            background: #000000;
            border-radius: 20px;
            z-index: 12;
            box-shadow: inset 0 0 2px rgba(255,255,255,0.1);
        }
        .frame-iphone .screen-view { border-radius: 34px; }

        .frame-ipad {
            width: 240px;
            height: 315px;
            background: #000;
            border: 6px solid #2d2d30;
            border-radius: 22px;
            padding: 7px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.4);
        }
        .frame-ipad .screen-view { border-radius: 12px; }

        .frame-macbook {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 290px;
        }
        .frame-macbook .mac-display {
            width: 100%;
            height: 182px;
            background: #000;
            border: 8px solid #000;
            border-radius: 12px 12px 0 0;
            padding: 1px;
        }
        .frame-macbook .screen-view { border-radius: 4px 4px 0 0; }
        .frame-macbook .mac-base {
            width: 114%;
            height: 8px;
            background: #55555e;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .text-bottom-center {
            font-size: 1.1rem;
            letter-spacing: 1px;
            white-space: nowrap;
            margin-top: 16px;
            text-align: center;
        }

        /* Controls Dashboard UI Layout */
        .panel-row { margin: 14px 0; }
        .panel-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .toolbar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        /* Dedicated Grid for Background Target Pattern Buttons */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .tool-btn {
            height: 38px;
            border-radius: 10px;
            background-color: #121214;
            border: 1px solid var(--border-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tool-btn:hover { background-color: #1a1a1e; border-color: #333; }
        .tool-btn.active { background-color: var(--text-light); color: var(--bg-dark); border-color: var(--text-light); }

        .color-palette { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; align-items: center; }
        .color-pill {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-pill:hover { transform: scale(1.1); }
        .color-pill.active { border-color: var(--text-light); }
        
        .hardware-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-dark);
            background: #121214;
            color: var(--text-gray);
        }
        .hardware-pill.active { background: var(--text-light); color: var(--bg-dark); border-color: var(--text-light); }

        .upload-bg-btn {
            background-color: #121214;
            border: 1px dashed #333;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-bg-btn:hover { background-color: #1a1a1e; border-color: #555; }

        .input-fields-flex { display: flex; gap: 8px; margin-top: 8px; }
        .text-input {
            flex: 1;
            min-width: 0;
            background-color: #121214;
            border: 1px solid var(--border-dark);
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .generate-btn {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .generate-btn:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>
    <br />

<div class="license-badge">✦ Premium Mockup Suite ✦</div>

<div class="editor-container">
    <div class="editor-header">
        <span>CLOSE MOCKUP EDITOR</span>
        <span class="close-btn">×</span>
    </div>

    <div class="preview-canvas contrast-light pattern-dotted" id="previewCanvas">
        <div class="canvas-header-meta">
            <div class="canvas-text text-top-left" id="topLeftLabel"></div>
            <div class="canvas-text text-top-right" id="live-date"></div>
        </div>
        
        <div class="center-content-group">
            <div class="device-slot-wrapper" id="deviceSlot">
                <div class="frame-iphone" id="hardwareFrame">
                    <div class="antenna-band antenna-top-left"></div>
                    <div class="antenna-band antenna-top-right"></div>
                    <div class="antenna-band antenna-bottom-left"></div>
                    <div class="antenna-band antenna-bottom-right"></div>
                    
                    <div class="screen-view" id="screenViewBg" style="background-image: url('https://images.unsplash.com/photo-1618005198143-e528346d9a59?w=400&amp;q=80');">
                        <div class="phone-screen-glass"></div>
                        <div class="upload-trigger-btn" onclick="triggerUpload()">TAP TO ADD</div>
                    </div>
                </div>
            </div>
            
            <div class="canvas-text text-bottom-center" id="labelOutput" style="font-family: 'Playfair Display', serif;">@MRJOYSAHA</div>
        </div>
    </div>

    <input accept="image/*" id="file-input" onchange="handleImageStream(this)" style="display: none;" type="file" />
    <input accept="image/*" id="bg-file-input" onchange="handleCustomBgStream(this)" style="display: none;" type="file" />
    
    <canvas height="2000" id="renderCanvas" style="display: none;" width="2000"></canvas>

    <div class="panel-row">
        <div class="panel-label">Hardware Device Type</div>
        <div class="toolbar-grid">
            <button class="tool-btn active" id="btn-iphone" onclick="swapDeviceConfig('iphone', this)">📱 iPhone</button>
            <button class="tool-btn" id="btn-ipad" onclick="swapDeviceConfig('ipad', this)">🔲 iPad</button>
            <button class="tool-btn" id="btn-macbook" onclick="swapDeviceConfig('macbook', this)">💻 Mac</button>
            <button class="tool-btn" onclick="toggleTextVisibility()" title="Toggle Overlays">👁 Hide Text</button>
        </div>
    </div>

    <div class="panel-row">
        <div class="panel-label">Background Line Pattern Angle</div>
        <div class="pattern-grid">
            <button class="tool-btn active" id="p-dotted" onclick="selectPatternDirect('pattern-dotted', this)">🔴 Dotted</button>
            <button class="tool-btn" id="p-lines" onclick="selectPatternDirect('pattern-lines', this)">── 180° H</button>
            <button class="tool-btn" id="p-box" onclick="selectPatternDirect('pattern-box', this)">🔳 Box</button>
            <button class="tool-btn" id="p-135" onclick="selectPatternDirect('pattern-line-135', this)">╲ 135°</button>
            <button class="tool-btn" id="p-270" onclick="selectPatternDirect('pattern-line-270', this)">│ 270° V</button>
            <button class="tool-btn" id="p-315" onclick="selectPatternDirect('pattern-line-315', this)">╱ 315°</button>
            <button class="tool-btn" id="p-none" onclick="selectPatternDirect('pattern-none', this)">❌ None</button>
        </div>
    </div>

    <div class="panel-row" id="iphone-options-panel">
        <div class="panel-label">iPhone Frame Material</div>
        <div style="display: flex; gap: 8px;">
            <button class="hardware-pill active" id="frame-gray" onclick="setIphoneMaterial('spacegray')">⬛ Space Gray</button>
            <button class="hardware-pill" id="frame-silver" onclick="setIphoneMaterial('silver')">⬜  Silver</button>
        </div>
    </div>

    <div class="panel-row">
    <div class="panel-label">Mockup Canvas Palette</div>
    <div class="color-palette">
        <button class="upload-bg-btn" onclick="triggerBgUpload()">🖼️ CUSTOM BG</button>
        
        <div class="color-pill active" onclick="setArtboardBg('#cc3333', 'light', this)" style="background: #cc3333;"></div>
        <div class="color-pill" onclick="setArtboardBg('#1e3a1e', 'light', this)" style="background: #1e3a1e;"></div>
        <div class="color-pill" onclick="setArtboardBg('#1e293b', 'light', this)" style="background: #1e293b;"></div>
        <div class="color-pill" onclick="setArtboardBg('#7c3aed', 'light', this)" style="background: #7c3aed;"></div>
        <div class="color-pill" onclick="setArtboardBg('#db2777', 'light', this)" style="background: #db2777;"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)', 'dark', this)" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #667eea 0%, #764ba2 100%)', 'light', this)" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
        <div class="color-pill" onclick="setArtboardBg('#1f1f1f', 'light', this)" style="background: #1f1f1f;"></div>
        <div class="color-pill" onclick="setArtboardBg('#ffffff', 'dark', this)" style="background: #ffffff;"></div>

        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #9791f1 0%, #484aaa 100%)', 'light', this)" style="background: linear-gradient(135deg, #9791f1 0%, #484aaa 100%);" title="Soft Blue to Dark Purple"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #484aaa 0%, #9791f1 100%)', 'light', this)" style="background: linear-gradient(135deg, #484aaa 0%, #9791f1 100%);" title="Dark Purple to Soft Blue"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #ddc2f2 0%, #9847b4 100%)', 'light', this)" style="background: linear-gradient(135deg, #ddc2f2 0%, #9847b4 100%);" title="Lavender to Magenta"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #9847b4 0%, #ddc2f2 100%)', 'light', this)" style="background: linear-gradient(135deg, #9847b4 0%, #ddc2f2 100%);" title="Magenta to Lavender"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #9791f1 0%, #ddc2f2 100%)', 'dark', this)" style="background: linear-gradient(135deg, #9791f1 0%, #ddc2f2 100%);" title="Periwinkle Pastel"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #ddc2f2 0%, #9791f1 100%)', 'dark', this)" style="background: linear-gradient(135deg, #ddc2f2 0%, #9791f1 100%);" title="Lavender Pastel"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #f20e04 0%, #7c1b16 100%)', 'light', this)" style="background: linear-gradient(135deg, #f20e04 0%, #7c1b16 100%);" title="Crimson Red"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #008080 0%, #800080 100%)', 'light', this)" style="background: linear-gradient(135deg, #008080 0%, #800080 100%);" title="Teal & Purple"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #00e492 0%, #00ffef 100%)', 'dark', this)" style="background: linear-gradient(135deg, #00e492 0%, #00ffef 100%);" title="Bright Mint Minty"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #9e86fa 0%, #ed80e9 100%)', 'light', this)" style="background: linear-gradient(135deg, #9e86fa 0%, #ed80e9 100%);" title="Neon Iris"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #0d1b2a 0%, #1c2b36 100%)', 'light', this)" style="background: linear-gradient(135deg, #0d1b2a 0%, #1c2b36 100%);" title="Midnight Navy"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #14dca9 0%, #00ff7f 100%)', 'dark', this)" style="background: linear-gradient(135deg, #14dca9 0%, #00ff7f 100%);" title="Cyber Green"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #e4e4e4 0%, #00ffec 100%)', 'dark', this)" style="background: linear-gradient(135deg, #e4e4e4 0%, #00ffec 100%);" title="Silver Electric Cyan"></div>
        <div class="color-pill" onclick="setArtboardBg('linear-gradient(135deg, #f15a60 0%, #ffbe0b 100%)', 'dark', this)" style="background: linear-gradient(135deg, #f15a60 0%, #ffbe0b 100%);" title="Sunset Coral"></div>
        <div class="color-pill" onclick="randomizePalette(this)" style="background: #555;">🎲</div>
    </div>
</div>

    <div class="panel-row">
        <div class="panel-label">CHANGE FONT STYLE</div>
        <div class="input-fields-flex">
            <input class="text-input" id="nameInput" oninput="updateLabelText(this.value)" placeholder="Add Name..." type="text" value="@MRJOYSAHA" />
            <select class="text-input" id="fontSelector" onchange="updateLabelFont(this.value)">
                <option value="'Playfair Display', serif">Premium Serif</option>
                <option value="'Codystar', cursive">Dotted Matrix</option>
                <option value="'Sacramento', cursive">Retro Script</option>
                <option value="'Inter', sans-serif">Clean Sans</option>
            </select>
        </div>
    </div>

    <button class="generate-btn" onclick="generateHighResMockupPNG()">
        GENERATE MOCKUP 
    </button>
</div>

<script>
    let activeDevice = 'iphone';
    let iphoneMaterial = 'spacegray'; 
    let currentBgStyle = '#cc3333';
    let currentPatternClass = 'pattern-dotted';
    let currentContrastMode = 'contrast-light'; 
    let uploadedImageBase64 = 'https://images.unsplash.com/photo-1618005198143-e528346d9a59?w=400&q=80'; 
    let customBgImageBase64 = null;
    let activeFontFamily = "'Playfair Display', serif";
    let textOverlaysVisible = true;

    const defaultPlaceholders = {
        iphone: '',
        ipad: '',
        macbook: ''
    };

    function getFormattedDate() {
        const today = new Date();
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        return today.toLocaleDateString('en-GB', options);
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('live-date').innerText = getFormattedDate();
    });

    function triggerUpload() { document.getElementById('file-input').click(); }
    function triggerBgUpload() { document.getElementById('bg-file-input').click(); }

    function handleImageStream(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImageBase64 = e.target.result;
                document.getElementById('screenViewBg').style.backgroundImage = `url('${uploadedImageBase64}')`;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function handleCustomBgStream(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                customBgImageBase64 = e.target.result;
                currentBgStyle = `url('${customBgImageBase64}')`;
                document.querySelectorAll('.color-pill').forEach(pill => pill.classList.remove('active'));
                setArtboardBg(currentBgStyle, 'light', null); 
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function setIphoneMaterial(material) {
        iphoneMaterial = material;
        const root = document.documentElement;
        document.querySelectorAll('.hardware-pill').forEach(pill => pill.classList.remove('active'));
        
        if (material === 'silver') {
            root.style.setProperty('--iphone-rim', '#d1d5db');
            root.style.setProperty('--iphone-bg', '#f3f4f6');
            root.style.setProperty('--antenna-opacity', '1');
            root.style.setProperty('--antenna-color', '#9ca3af');
            document.getElementById('frame-silver').classList.add('active');
        } else {
            root.style.setProperty('--iphone-rim', '#3a3a3c');
            root.style.setProperty('--iphone-bg', '#111112');
            root.style.setProperty('--antenna-opacity', '0');
            document.getElementById('frame-gray').classList.add('active');
        }
    }

    function swapDeviceConfig(deviceType, btnElement) {
        activeDevice = deviceType;
        document.querySelectorAll('.toolbar-grid .tool-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        const optPanel = document.getElementById('iphone-options-panel');
        optPanel.style.display = (deviceType === 'iphone') ? 'block' : 'none';

        const slot = document.getElementById('deviceSlot');
        let currentScreenImg = uploadedImageBase64.startsWith('data:') ? uploadedImageBase64 : defaultPlaceholders[deviceType];
        
        if(deviceType === 'iphone') {
            slot.innerHTML = `
                <div class="frame-iphone" id="hardwareFrame">
                    <div class="antenna-band antenna-top-left"></div>
                    <div class="antenna-band antenna-top-right"></div>
                    <div class="antenna-band antenna-bottom-left"></div>
                    <div class="antenna-band antenna-bottom-right"></div>
                    <div class="screen-view" id="screenViewBg" style="background-image: url('${currentScreenImg}');">
                        <div class="phone-screen-glass"></div>
                        <div class="upload-trigger-btn" onclick="triggerUpload()">TAP TO ADD</div>
                    </div>
                </div>`;
            setIphoneMaterial(iphoneMaterial); 
        } else if (deviceType === 'ipad') {
            slot.innerHTML = `<div class="frame-ipad" id="hardwareFrame"><div class="screen-view" id="screenViewBg" style="background-image: url('${currentScreenImg}');"><div class="upload-trigger-btn" onclick="triggerUpload()">TAP TO ADD</div></div></div>`;
        } else if (deviceType === 'macbook') {
            slot.innerHTML = `<div class="frame-macbook" id="hardwareFrame"><div class="mac-display"><div class="screen-view" id="screenViewBg" style="background-image: url('${currentScreenImg}');"><div class="upload-trigger-btn" onclick="triggerUpload()">TAP TO ADD</div></div></div><div class="mac-base"></div></div>`;
        }
    }

    function setArtboardBg(bgValue, contrastTarget, pillElement) {
        currentBgStyle = bgValue;
        const artboard = document.getElementById('previewCanvas');
        if (bgValue.startsWith('url')) { artboard.style.backgroundImage = bgValue; } 
        else { artboard.style.background = bgValue; }

        currentContrastMode = (contrastTarget === 'dark') ? 'contrast-dark' : 'contrast-light';
        setArtboardPattern(currentPatternClass);
        
        const textElements = document.querySelectorAll('.canvas-text');
        textElements.forEach(el => el.style.color = (contrastTarget === 'dark') ? '#000000' : '#ffffff');

        if(pillElement) {
            document.querySelectorAll('.color-pill').forEach(pill => pill.classList.remove('active'));
            pillElement.classList.add('active');
        }
    }

    /* --- Direct Selector Mechanism for Specific Patterns --- */
    function selectPatternDirect(patternClass, btnElement) {
        document.querySelectorAll('.pattern-grid .tool-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        setArtboardPattern(patternClass);
    }

    function setArtboardPattern(patternClass) {
        const artboard = document.getElementById('previewCanvas');
        artboard.className = 'preview-canvas'; 
        currentPatternClass = patternClass;
        artboard.classList.add(currentContrastMode);
        if(patternClass !== 'pattern-none') artboard.classList.add(patternClass);
    }

    function updateLabelText(val) { document.getElementById('labelOutput').innerText = val || ""; }
    function updateLabelFont(fontName) {
        activeFontFamily = fontName;
        document.getElementById('labelOutput').style.fontFamily = fontName;
    }

    function toggleTextVisibility() {
        textOverlaysVisible = !textOverlaysVisible;
        const displayStyle = textOverlaysVisible ? 'block' : 'none';
        document.getElementById('labelOutput').style.display = displayStyle;
        document.getElementById('live-date').style.display = displayStyle;
        document.getElementById('topLeftLabel').style.display = displayStyle;
    }

    function randomizePalette(pillElement) {
        const randomHex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        const r = parseInt(randomHex.slice(1,3), 16), g = parseInt(randomHex.slice(3,5), 16), b = parseInt(randomHex.slice(5,7), 16);
        const calculatedContrast = ((0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5) ? 'dark' : 'light';
        setArtboardBg(randomHex, calculatedContrast, pillElement);
    }

    /* --- HTML5 Canvas High-Res Artboard Pipeline --- */
    function generateHighResMockupPNG() {
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const W = 2000; const H = 2000; 
        canvas.width = W; canvas.height = H;
        ctx.clearRect(0, 0, W, H);
        
        if (currentBgStyle.startsWith("url") && customBgImageBase64) {
            const bgImg = new Image();
            bgImg.src = customBgImageBase64;
            ctx.drawImage(bgImg, 0, 0, W, H);
            proceedToOverlayRendering();
        } else {
            if (currentBgStyle.includes('linear-gradient')) {
                let gradient = ctx.createLinearGradient(0, 0, W, H);
                
                // Exact color checks matching your new combinations
                if (currentBgStyle.includes('#ff9a9e')) {
                    gradient.addColorStop(0, '#ff9a9e'); gradient.addColorStop(1, '#fecfef');
                } else if (currentBgStyle.includes('#9791f1') && currentBgStyle.includes('#484aaa')) {
                    if (currentBgStyle.indexOf('#9791f1') < currentBgStyle.indexOf('#484aaa')) {
                        gradient.addColorStop(0, '#9791f1'); gradient.addColorStop(1, '#484aaa');
                    } else {
                        gradient.addColorStop(0, '#484aaa'); gradient.addColorStop(1, '#9791f1');
                    }
                } else if (currentBgStyle.includes('#ddc2f2') && currentBgStyle.includes('#9847b4')) {
                    if (currentBgStyle.indexOf('#ddc2f2') < currentBgStyle.indexOf('#9847b4')) {
                        gradient.addColorStop(0, '#ddc2f2'); gradient.addColorStop(1, '#9847b4');
                    } else {
                        gradient.addColorStop(0, '#9847b4'); gradient.addColorStop(1, '#ddc2f2');
                    }
                } else if (currentBgStyle.includes('#9791f1') && currentBgStyle.includes('#ddc2f2')) {
                    if (currentBgStyle.indexOf('#9791f1') < currentBgStyle.indexOf('#ddc2f2')) {
                        gradient.addColorStop(0, '#9791f1'); gradient.addColorStop(1, '#ddc2f2');
                    } else {
                        gradient.addColorStop(0, '#ddc2f2'); gradient.addColorStop(1, '#9791f1');
                    }
                } else if (currentBgStyle.includes('#f20e04')) {
                    gradient.addColorStop(0, '#f20e04'); gradient.addColorStop(1, '#7c1b16');
                } else if (currentBgStyle.includes('#008080')) {
                    gradient.addColorStop(0, '#008080'); gradient.addColorStop(1, '#800080');
                } else if (currentBgStyle.includes('#00e492')) {
                    gradient.addColorStop(0, '#00e492'); gradient.addColorStop(1, '#00ffef');
                } else if (currentBgStyle.includes('#9e86fa')) {
                    gradient.addColorStop(0, '#9e86fa'); gradient.addColorStop(1, '#ed80e9');
                } else if (currentBgStyle.includes('#0d1b2a')) {
                    gradient.addColorStop(0, '#0d1b2a'); gradient.addColorStop(1, '#1c2b36');
                } else if (currentBgStyle.includes('#14dca9')) {
                    gradient.addColorStop(0, '#14dca9'); gradient.addColorStop(1, '#00ff7f');
                } else if (currentBgStyle.includes('#e4e4e4')) {
                    gradient.addColorStop(0, '#e4e4e4'); gradient.addColorStop(1, '#00ffec');
                } else if (currentBgStyle.includes('#f15a60')) {
                    gradient.addColorStop(0, '#f15a60'); gradient.addColorStop(1, '#ffbe0b');
                } else {
                    // Default Fallback Gradient
                    gradient.addColorStop(0, '#667eea'); gradient.addColorStop(1, '#764ba2');
                }
                ctx.fillStyle = gradient;
            } else { ctx.fillStyle = currentBgStyle; }
            ctx.fillRect(0, 0, W, H);
            proceedToOverlayRendering();
        }

        function proceedToOverlayRendering() {
            const alphaColor = (currentContrastMode === 'contrast-dark') ? "rgba(0, 0, 0, " : "rgba(255, 255, 255, ";

            if (currentPatternClass === 'pattern-dotted') {
                ctx.fillStyle = alphaColor + "0.15)";
                for (let x = 0; x < W; x += 50) {
                    for (let y = 0; y < H; y += 50) {
                        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
                    }
                }
            } else if (currentPatternClass === 'pattern-lines') {
                ctx.strokeStyle = alphaColor + "0.1)";
                ctx.lineWidth = 3;
                for (let y = 0; y < H; y += 25) { 
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
                }
            } else if (currentPatternClass === 'pattern-box') {
                ctx.strokeStyle = alphaColor + "0.08)";
                ctx.lineWidth = 2.5;
                for (let x = 0; x < W; x += 36) { 
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, x); ctx.lineTo(W, x); ctx.stroke();
                }
            } else if (currentPatternClass === 'pattern-line-135') {
                ctx.strokeStyle = alphaColor + "0.1)";
                ctx.lineWidth = 3;
                for (let i = -H; i < W; i += 35) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
                }
            } else if (currentPatternClass === 'pattern-line-270') {
                ctx.strokeStyle = alphaColor + "0.1)";
                ctx.lineWidth = 3;
                for (let x = 0; x < W; x += 25) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                }
            } else if (currentPatternClass === 'pattern-line-315') {
                ctx.strokeStyle = alphaColor + "0.1)";
                ctx.lineWidth = 3;
                for (let i = 0; i < W + H; i += 35) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
                }
            }

            if (textOverlaysVisible) {
                ctx.fillStyle = (currentContrastMode === 'contrast-dark') ? "rgba(0, 0, 0, 0.85)" : "rgba(255, 255, 255, 0.85)";
                ctx.font = "34px Inter, sans-serif";
                ctx.textAlign = "right";
                ctx.fillText(getFormattedDate(), W - 80, 100);
            }

            const currentTargetImageSrc = uploadedImageBase64.startsWith('data:') ? uploadedImageBase64 : defaultPlaceholders[activeDevice];
            const screenImg = new Image();
            screenImg.crossOrigin = "anonymous";
            screenImg.src = currentTargetImageSrc;
            
            screenImg.onload = function() {
                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur = 90;
                ctx.shadowOffsetY = 40;

                let computedDeviceBottomY = H / 2;

                if (activeDevice === 'iphone') {
                    const fW = 720, fH = 1320; const fX = (W - fW) / 2, fY = (H - fH) / 2 - 40;
                    const outerRimColor = (iphoneMaterial === 'silver') ? "#e5e7eb" : "#2c2c2e";
                    const innerBezelColor = (iphoneMaterial === 'silver') ? "#ffffff" : "#000000";
                    
                    ctx.fillStyle = outerRimColor; ctx.beginPath(); ctx.roundRect(fX, fY, fW, fH, 145); ctx.fill();
                    
                    if (iphoneMaterial === 'silver') {
                        ctx.fillStyle = "#9ca3af";
                        ctx.fillRect(fX, fY + 180, 12, 12); ctx.fillRect(fX + fW - 12, fY + 180, 12, 12);
                        ctx.fillRect(fX, fY + fH - 180, 12, 12); ctx.fillRect(fX + fW - 12, fY + fH - 180, 12, 12);
                    }
                    
                    ctx.fillStyle = innerBezelColor; ctx.beginPath(); ctx.roundRect(fX + 12, fY + 12, fW - 24, fH - 24, 133); ctx.fill();
                    ctx.shadowColor = "transparent"; 
                    ctx.save(); ctx.beginPath(); ctx.roundRect(fX + 30, fY + 30, fW - 60, fH - 60, 112); ctx.clip();
                    ctx.drawImage(screenImg, fX + 30, fY + 30, fW - 60, fH - 60);
                    
                    let reflection = ctx.createLinearGradient(fX, fY, fX+fW, fY+fH);
                    reflection.addColorStop(0, "rgba(255,255,255,0.18)"); reflection.addColorStop(0.4, "rgba(255,255,255,0)");
                    ctx.fillStyle = reflection; ctx.fillRect(fX+30, fY+30, fW-60, fH-60);
                    ctx.restore();
                    
                    ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.roundRect(W/2 - 100, fY + 60, 200, 54, 30); ctx.fill();
                    computedDeviceBottomY = fY + fH;
                } else if (activeDevice === 'ipad') {
                    const fW = 920, fH = 1220; const fX = (W - fW) / 2, fY = (H - fH) / 2 - 40;
                    ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.roundRect(fX, fY, fW, fH, 60); ctx.fill();
                    ctx.shadowColor = "transparent";
                    ctx.save(); ctx.beginPath(); ctx.roundRect(fX + 26, fY + 26, fW - 52, fH - 52, 40); ctx.clip();
                    ctx.drawImage(screenImg, fX + 26, fY + 26, fW - 52, fH - 52); ctx.restore();
                    computedDeviceBottomY = fY + fH;
                } else if (activeDevice === 'macbook') {
                    const displayW = 1240, displayH = 780; const displayX = (W - displayW) / 2, displayY = (H - displayH) / 2 - 80;
                    ctx.fillStyle = "#000000"; ctx.beginPath(); ctx.roundRect(displayX, displayY, displayW, displayH, [32, 32, 0, 0]); ctx.fill();
                    ctx.shadowColor = "transparent";
                    ctx.save(); ctx.beginPath(); ctx.roundRect(displayX + 18, displayY + 18, displayW - 36, displayH - 22, [18, 18, 0, 0]); ctx.clip();
                    ctx.drawImage(screenImg, displayX + 18, displayY + 18, displayW - 36, displayH - 22); ctx.restore();
                    const baseX = displayX - 80, baseY = displayY + displayH; const baseW = displayW + 160, baseH = 26;
                    ctx.fillStyle = "#94a3b8"; ctx.beginPath(); ctx.roundRect(baseX, baseY, baseW, baseH, [0, 0, 24, 24]); ctx.fill();
                    ctx.fillStyle = "#475569"; ctx.beginPath(); ctx.roundRect(W/2 - 90, baseY, 180, 8, [0, 0, 6, 6]); ctx.fill();
                    computedDeviceBottomY = baseY + baseH;
                }

                if (textOverlaysVisible) {
                    const rawFontFamily = activeFontFamily.split(',')[0].replace(/'/g, "");
                    ctx.fillStyle = (currentContrastMode === 'contrast-dark') ? "#000000" : "#ffffff"; 
                    ctx.textAlign = "center";
                    ctx.font = `66px ${rawFontFamily}`;
                    ctx.fillText(document.getElementById('nameInput').value || "", W / 2, computedDeviceBottomY + 110); 
                }

                const downloadLink = document.createElement('a');
                downloadLink.download = `MockupStudio_${activeDevice}_2000x2000.png`;
                downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.click();
            };
        }
    }
    
</script>
