<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);
}

.container{
width:100%;
max-width:600px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:30px;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;

padding:12px;

border:none;
outline:none;

border-radius:12px;

resize:none;

font-size:15px;
}

button{
width:100%;

margin-top:15px;

padding:14px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.qr-box{
margin-top:25px;

display:flex;
justify-content:center;
}

#qrcode{
background:white;
padding:15px;
border-radius:12px;
}

.download-btn{
display:none;
text-decoration:none;
text-align:center;

margin-top:15px;

padding:14px;

border-radius:12px;

background:#16a34a;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>📱 QR Code Generator</h1>

<textarea
id="qrText"
placeholder="Enter text, URL, email, phone number, etc...">
</textarea>

<button onclick="generateQR()">
Generate QR Code
</button>

<div class="qr-box">
<div id="qrcode"></div>
</div>

<a
id="downloadBtn"
class="download-btn"
download="qrcode.png">
Download QR Code
</a>

</div>

<script>

function generateQR(){

const text =
document.getElementById("qrText").value.trim();

if(text===""){

alert("Please enter text.");

return;
}

const qrContainer =
document.getElementById("qrcode");

qrContainer.innerHTML="";

new QRCode(qrContainer,{

text:text,

width:250,
height:250,

colorDark:"#000000",
colorLight:"#ffffff",

correctLevel:QRCode.CorrectLevel.H

});

setTimeout(enableDownload,300);

}

function enableDownload(){

const img =
document.querySelector("#qrcode img");

const canvas =
document.querySelector("#qrcode canvas");

let src="";

if(img){
src = img.src;
}
else if(canvas){
src = canvas.toDataURL("image/png");
}

if(src){

const downloadBtn =
document.getElementById("downloadBtn");

downloadBtn.href = src;

downloadBtn.style.display = "block";

}

}

</script>

</body>
</html>
