<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Compressor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);

padding:20px;
}

.container{
max-width:700px;
margin:auto;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:12px;
}

button{
width:100%;
padding:14px;
margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.status{
margin-top:20px;
text-align:center;
}

.download{
display:none;

margin-top:20px;

text-align:center;
text-decoration:none;

padding:14px;

border-radius:12px;

background:#16a34a;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>📄 PDF Compressor</h1>

<input
type="file"
id="pdfFile"
accept=".pdf">

<select id="quality">

<option value="0.8">
High Quality
</option>

<option value="0.5">
Medium Compression
</option>

<option value="0.3">
Strong Compression
</option>

<option value="0.15">
Maximum Compression
</option>

</select>

<button onclick="compressPDF()">
Compress PDF
</button>

<div class="status" id="status"></div>

<a
id="downloadBtn"
class="download"
download="compressed.pdf">
Download Compressed PDF
</a>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js";

async function compressPDF(){

const file =
document.getElementById("pdfFile").files[0];

if(!file){

alert("Please select PDF");

return;
}

const quality =
parseFloat(
document.getElementById("quality").value
);

const status =
document.getElementById("status");

status.innerHTML =
"⏳ Compressing PDF...";

const arrayBuffer =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data:arrayBuffer
}).promise;

const { jsPDF } =
window.jspdf;

const newPdf =
new jsPDF();

for(let pageNum=1;
pageNum<=pdf.numPages;
pageNum++){

status.innerHTML =
`Processing Page ${pageNum} of ${pdf.numPages}`;

const page =
await pdf.getPage(pageNum);

const viewport =
page.getViewport({
scale:1.2
});

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width =
viewport.width;

canvas.height =
viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const imageData =
canvas.toDataURL(
"image/jpeg",
quality
);

const width =
newPdf.internal.pageSize.getWidth();

const height =
(viewport.height*width)/
viewport.width;

if(pageNum>1){
newPdf.addPage();
}

newPdf.addImage(
imageData,
"JPEG",
0,
0,
width,
height
);

}

const pdfBlob =
newPdf.output("blob");

const url =
URL.createObjectURL(pdfBlob);

const downloadBtn =
document.getElementById("downloadBtn");

downloadBtn.href = url;
downloadBtn.style.display = "block";

status.innerHTML =
"✅ Compression Complete";

}

</script>

</body>
</html>
