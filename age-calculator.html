<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

display:flex;
justify-content:center;
align-items:center;

color:var(--text);
}

.container{
width:100%;
max-width:700px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;

border:none;
outline:none;

border-radius:12px;

font-size:16px;
}

button{
width:100%;
padding:14px;

margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.result{
margin-top:20px;

padding:20px;

border-radius:15px;

background:rgba(255,255,255,.05);

line-height:2;
}

.copy-btn{
background:#16a34a;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🎂 Age Calculator</h1>

<input
type="date"
id="birthDate">

<button onclick="calculateAge()">
Calculate Age
</button>

<div
class="result"
id="result">

Select your birth date and click Calculate.

</div>

<button
class="copy-btn"
onclick="copyResult()">

Copy Result

</button>

</div>

<script>

function calculateAge(){

const birthDate =
new Date(
document.getElementById(
"birthDate"
).value
);

if(isNaN(birthDate)){

alert("Please select your birth date.");

return;
}

const today =
new Date();

let years =
today.getFullYear()
-
birthDate.getFullYear();

let months =
today.getMonth()
-
birthDate.getMonth();

let days =
today.getDate()
-
birthDate.getDate();

if(days < 0){

months--;

const prevMonth =
new Date(
today.getFullYear(),
today.getMonth(),
0
);

days += prevMonth.getDate();
}

if(months < 0){

years--;
months += 12;
}

const totalDays =
Math.floor(
(today - birthDate)
/
(1000*60*60*24)
);

const totalWeeks =
Math.floor(
totalDays / 7
);

const totalMonths =
years * 12 + months;

let nextBirthday =
new Date(
today.getFullYear(),
birthDate.getMonth(),
birthDate.getDate()
);

if(nextBirthday < today){

nextBirthday.setFullYear(
today.getFullYear()+1
);

}

const birthdayDays =
Math.ceil(
(nextBirthday - today)
/
(1000*60*60*24)
);

document.getElementById(
"result"
).innerHTML =

`
🎉 <b>Exact Age</b><br>

Years: <b>${years}</b><br>
Months: <b>${months}</b><br>
Days: <b>${days}</b><br><br>

📅 <b>Total Time Lived</b><br>

Total Months:
<b>${totalMonths}</b><br>

Total Weeks:
<b>${totalWeeks}</b><br>

Total Days:
<b>${totalDays}</b><br><br>

🎂 <b>Next Birthday</b><br>

${birthdayDays}
days remaining
`;

}

function copyResult(){

const text =
document.getElementById(
"result"
).innerText;

navigator.clipboard.writeText(
text
);

alert("Result copied!");

}

</script>

</body>
</html>
