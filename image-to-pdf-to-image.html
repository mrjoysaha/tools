<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image ↔ PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);

padding:20px;
}

.container{
max-width:900px;
margin:auto;

background:var(--card);

backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

select,
input{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:12px;
}

button{
width:100%;
padding:14px;
margin-top:15px;

border:none;
border-radius:12px;

background:var(--primary);
color:white;

cursor:pointer;
font-weight:bold;
}

.preview{
margin-top:20px;

display:grid;
grid-template-columns:
repeat(auto-fill,minmax(180px,1fr));

gap:15px;
}

.preview img{
width:100%;
border-radius:12px;
}

.download{
display:block;

margin-top:15px;

padding:12px;

text-align:center;

text-decoration:none;

background:#16a34a;
color:white;

border-radius:12px;
}

.status{
margin-top:15px;
text-align:center;
}

</style>
</head>
<body>

<div class="container">

<h1>📄 IMAGE ↔ PDF Converter</h1>

<select id="mode">

<option value="img2pdf">
IMAGE → PDF
</option>

<option value="pdf2img">
PDF → IMAGE
</option>

</select>

<input
type="file"
id="fileInput"
multiple>

<button onclick="processFile()">
Convert
</button>

<div class="status" id="status"></div>

<div class="preview" id="preview"></div>

<div id="downloads"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js";

async function processFile(){

const mode =
document.getElementById("mode").value;

if(mode==="img2pdf"){
convertImagesToPDF();
}
else{
convertPDFToImages();
}

}

/* IMAGE TO PDF */

async function convertImagesToPDF(){

const files =
document.getElementById("fileInput").files;

if(files.length===0){
alert("Select images");
return;
}

document.getElementById("status")
.innerHTML="Creating PDF...";

const {jsPDF}=window.jspdf;

const pdf=new jsPDF();

for(let i=0;i<files.length;i++){

const dataUrl =
await fileToDataURL(files[i]);

const img =
await loadImage(dataUrl);

const width =
pdf.internal.pageSize.getWidth();

const height =
(img.height*width)/img.width;

if(i>0){
pdf.addPage();
}

pdf.addImage(
dataUrl,
"JPEG",
0,
0,
width,
height
);

}

pdf.save("converted.pdf");

document.getElementById("status")
.innerHTML="✅ PDF Download Started";

}

/* PDF TO IMAGE */

async function convertPDFToImages(){

const file =
document.getElementById("fileInput")
.files[0];

if(!file){
alert("Select PDF");
return;
}

document.getElementById("status")
.innerHTML="Converting PDF...";

const preview =
document.getElementById("preview");

const downloads =
document.getElementById("downloads");

preview.innerHTML="";
downloads.innerHTML="";

const pdfData =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data:pdfData
}).promise;

for(let pageNum=1;
pageNum<=pdf.numPages;
pageNum++){

const page =
await pdf.getPage(pageNum);

const viewport =
page.getViewport({
scale:2
});

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width =
viewport.width;

canvas.height =
viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const image =
canvas.toDataURL("image/png");

preview.innerHTML += `
<img src="${image}">
`;

downloads.innerHTML += `
<a
class="download"
href="${image}"
download="page-${pageNum}.png">
Download Page ${pageNum}
</a>
`;

}

document.getElementById("status")
.innerHTML=
"✅ PDF Converted Successfully";

}

/* HELPERS */

function fileToDataURL(file){

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload =
e=>resolve(e.target.result);

reader.readAsDataURL(file);

});

}

function loadImage(src){

return new Promise(resolve=>{

const img =
new Image();

img.onload =
()=>resolve(img);

img.src=src;

});

}

</script>

</body>
</html>
