<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date Calculator</title>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--text:#fff;
--primary:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
padding:20px;

background:
radial-gradient(circle at top left,#2563eb25,transparent 25%),
radial-gradient(circle at bottom right,#9333ea25,transparent 25%),
var(--bg);

color:var(--text);

display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:800px;

background:var(--card);
backdrop-filter:blur(20px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.section{
margin-bottom:30px;
}

h2{
margin-bottom:15px;
font-size:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:12px;

font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:15px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:bold;

background:var(--primary);
color:white;
}

.result{
margin-top:15px;

padding:15px;

border-radius:12px;

background:rgba(255,255,255,.05);

line-height:1.8;
}

.copy-btn{
background:#16a34a;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>📅 Date Calculator</h1>

<div class="section">

<h2>Date Difference</h2>

<input type="date" id="startDate">

<input type="date" id="endDate">

<button onclick="calculateDifference()">
Calculate Difference
</button>

<div class="result" id="differenceResult">
Select dates and calculate.
</div>

</div>

<div class="section">

<h2>Add / Subtract Days</h2>

<input type="date" id="baseDate">

<input
type="number"
id="daysInput"
placeholder="Enter days (+ or -)">

<button onclick="calculateFutureDate()">
Calculate New Date
</button>

<div class="result" id="futureResult">
Enter a date and number of days.
</div>

<button
class="copy-btn"
onclick="copyResult()">
Copy Result
</button>

</div>

</div>

<script>

function calculateDifference(){

const start =
new Date(
document.getElementById(
"startDate"
).value
);

const end =
new Date(
document.getElementById(
"endDate"
).value
);

if(isNaN(start)||isNaN(end)){

alert("Please select both dates.");

return;
}

const diff =
Math.abs(end-start);

const totalDays =
Math.floor(
diff/(1000*60*60*24)
);

const years =
Math.floor(totalDays/365);

const months =
Math.floor(
(totalDays%365)/30
);

const days =
(totalDays%365)%30;

document.getElementById(
"differenceResult"
).innerHTML =

`
<b>Total Days:</b> ${totalDays}<br>
<b>Years:</b> ${years}<br>
<b>Months:</b> ${months}<br>
<b>Days:</b> ${days}
`;

}

function calculateFutureDate(){

const dateValue =
document.getElementById(
"baseDate"
).value;

const days =
parseInt(
document.getElementById(
"daysInput"
).value
);

if(!dateValue){

alert("Please select a date.");

return;
}

const date =
new Date(dateValue);

date.setDate(
date.getDate()+days
);

document.getElementById(
"futureResult"
).innerHTML =

`
<b>Result Date:</b><br>
${date.toDateString()}
`;

}

function copyResult(){

const text =

document.getElementById(
"differenceResult"
).innerText +

"\n\n" +

document.getElementById(
"futureResult"
).innerText;

navigator.clipboard.writeText(text);

alert("Result copied!");

}

</script>

</body>
</html>
